name: Publish to PyPI

# Publishes the package to PyPI when a version tag (e.g. v0.1.0) is pushed,
# or when triggered manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC) — no stored token needed
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # If you prefer an API token instead of Trusted Publishing, add a
        # `PYPI_API_TOKEN` repo secret and uncomment the line below.
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}

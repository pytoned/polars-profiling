name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    name: Tests | Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip "setuptools<81" wheel
          pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/unit/ -q

      - name: CLI smoke test
        run: data_profiling -h

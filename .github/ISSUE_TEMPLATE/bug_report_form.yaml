name: 🐛 Bug report
description: Report a problem with polars-profiling
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the
        details below so we can reproduce and fix the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the full error/traceback if any.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducible example
      description: A small Polars snippet that triggers the problem.
      render: python
      placeholder: |
        import polars as pl
        from polars_profiling import ProfileReport

        df = pl.DataFrame({"a": [1, 2, 3]})
        ProfileReport(df).to_file("report.html")
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: polars-profiling version
      description: Output of `pip show polars-profiling`
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and versions of relevant dependencies (`pip freeze`).
    validations:
      required: false
